<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
  <defs>
    <style>
      .bg { fill: #0f6675; }
      .text { fill: #fffaf2; font-family: 'Space Grotesk', sans-serif; font-size: 80px; font-weight: 700; text-anchor: middle; dominant-baseline: middle; }
    </style>
  </defs>
  <!-- Background -->
  <rect width="192" height="192" class="bg"/>
  <!-- Rounded corners effect -->
  <circle cx="24" cy="24" r="24" class="bg"/>
  <circle cx="168" cy="24" r="24" class="bg"/>
  <circle cx="24" cy="168" r="24" class="bg"/>
  <circle cx="168" cy="168" r="24" class="bg"/>
  <!-- Text "GG" -->
  <text x="96" y="96" class="text">GG</text>
</svg>
